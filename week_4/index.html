<!DOCTYPE html>
<html>
<head>
    <title>사하구청 AI 상담사</title>
</head>
<body>
    <div class="chat-container">
        <h1>🏛️ 사하구 AI 민원 상담사</h1>
        <div id="chatBox">
            <p>안녕하세요! 무엇을 도와드릴까요?</p>
        </div>
        <input type="text" id="userInput" placeholder="질문을 입력하세요 (예: 대형폐기물 버리는 법)">
        <button onclick="sendMessage()">전송</button>
    </div>
</body>
</html>
