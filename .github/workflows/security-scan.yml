# .github/workflows/security-scan.yml
name: Security Scan (npm audit)

on:
  push:
    paths:
      - 'Week09/package.json'
  schedule:
    - cron: '0 0 * * 1' # 매주 월요일 자정에 자동 실행 (스케줄 조건 충족)

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Run npm audit
        working-directory: ./Week09
        # 취약점(high 이상)이 발견되어 에러가 나도 다음 단계(이슈 생성)로 넘어가도록 설정
        run: npm audit --audit-level=high
        continue-on-error: true
        id: audit

      - name: Create Issue on Vulnerability
        if: steps.audit.outcome == 'failure' # audit 결과 취약점이 발견된 경우에만 실행
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 보안 취약점 발견 (npm audit)',
              body: 'Week09 패키지에서 높은 수준의 보안 취약점이 발견되었습니다. `npm audit fix` 명령어를 통해 빠른 확인 및 조치가 필요합니다.'
            })